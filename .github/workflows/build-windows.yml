name: Build Windows Installer

# Builds Kami-Setup.exe on every push to main and on version tags, using a
# free GitHub-hosted Windows runner -- nobody needs an actual Windows
# machine to produce a release build.
#
#   - push to main / manual run  -> installer is attached as a downloadable
#                                   build artifact on the workflow run page
#   - push a tag like "v1.0.0"   -> the above, PLUS a GitHub Release is
#                                   published with Kami-Setup.exe attached,
#                                   so there's a stable download link to
#                                   hand out (repo's Releases page)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

permissions:
  contents: write   # needed to publish a GitHub Release on tag pushes

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download static ffmpeg (bundled into the installer)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $exe = Get-ChildItem -Path ffmpeg_extracted -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName -Destination ffmpeg.exe

      - name: Build app with PyInstaller
        run: pyinstaller packaging/kami.spec --noconfirm --distpath dist --workpath build

      - name: Bundle ffmpeg.exe alongside the app
        shell: pwsh
        run: Copy-Item ffmpeg.exe -Destination dist\Kami\ffmpeg.exe

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\installer.iss

      - name: Upload installer as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kami-Setup
          path: dist_installer\Kami-Setup.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" "dist_installer/Kami-Setup.exe" \
            --title "Kami ${{ github.ref_name }}" \
            --notes "Automated build. Download Kami-Setup.exe below, run it, and follow the installer -- no separate Python or ffmpeg install needed."
