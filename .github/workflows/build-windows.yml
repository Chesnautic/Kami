name: Build Windows Installer

# Builds Kami-Setup.exe on every push to main and on version tags, using a
# free GitHub-hosted Windows runner -- nobody needs an actual Windows
# machine to produce a release build.
#
#   - every push to main   -> installer is attached as a downloadable build
#                              artifact on the workflow run page, AND the
#                              rolling "latest" GitHub Release is replaced
#                              with this build, so the repo's
#                              /releases/latest link is *always* current --
#                              no need to remember to tag a version just to
#                              get a fresh download link out.
#   - push a tag "v1.0.0"  -> the above, PLUS a proper versioned Release
#                              (e.g. "v1.0.0") is published for anyone who
#                              wants a stable, pinned version to link to.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: {}

permissions:
  contents: write   # needed to publish a GitHub Release on tag pushes

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download static ffmpeg (bundled into the installer)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $exe = Get-ChildItem -Path ffmpeg_extracted -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName -Destination ffmpeg.exe

      - name: Build app with PyInstaller
        run: pyinstaller packaging/kami.spec --noconfirm --distpath dist --workpath build

      - name: Bundle ffmpeg.exe alongside the app
        shell: pwsh
        run: Copy-Item ffmpeg.exe -Destination dist\Kami\ffmpeg.exe

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\installer.iss

      - name: Upload installer as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kami-Setup
          path: dist_installer\Kami-Setup.exe

      - name: Publish rolling "latest" release (always current with main)
        # This is what makes the Releases page a trustworthy "always the
        # newest build" link -- every single push to main replaces this
        # release's asset, instead of only updating on a manually-tagged
        # version (which is easy to forget, and silently leaves the
        # Releases page pointing at a stale, possibly-broken old build).
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest "dist_installer/Kami-Setup.exe" \
            --title "Kami -- latest build" \
            --notes "Automated build from the newest main branch commit (${{ github.sha }}). This link always points at the most recent Kami-Setup.exe. Download it, run it, and follow the installer -- no separate Python or ffmpeg install needed."

      - name: Publish versioned GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" "dist_installer/Kami-Setup.exe" \
            --title "Kami ${{ github.ref_name }}" \
            --notes "Automated build. Download Kami-Setup.exe below, run it, and follow the installer -- no separate Python or ffmpeg install needed."
